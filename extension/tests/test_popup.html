<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Popup Unit Tests</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    .suite { margin: 16px 0 4px; font-weight: bold; color: #b09255; }
    .result { margin-left: 16px; }
    #summary { margin-top: 24px; font-size: 1.1em; border-top: 1px solid #444; padding-top: 12px; }
  </style>
</head>
<body>
  <h2>Popup Unit Tests</h2>
  <div id="output"></div>
  <div id="summary"></div>
  <script src="test_popup.js"></script>
</body>
</html>
