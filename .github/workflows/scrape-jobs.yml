name: Scrape Jobs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-jobspy httpx

      - name: Run JobSpy scraper (Indeed + LinkedIn)
        run: python scripts/scrape_jobspy.py
        continue-on-error: true

      - name: Run LinkedIn guest API scraper
        run: python scripts/scrape_linkedin.py
        continue-on-error: true

      - name: Trigger ATS scraper
        run: |
          curl -X POST "https://www.tailrd.ca/github-sources/scrape-ats" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 300 || true

      - name: Trigger GitHub aggregator
        run: |
          curl -X POST "https://www.tailrd.ca/github-sources/cron-poll" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 300 || true
