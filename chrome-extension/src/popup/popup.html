<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ApplyPilot Autofill</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- Header (shared across views) -->
    <header class="header">
      <div class="brand">
        <span class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </span>
        <div class="brand-text">
          <span class="brand-name">ApplyPilot</span>
          <span class="brand-sub">Job Application Autofill</span>
        </div>
      </div>
      <div class="header-right">
        <span id="status-chip" class="chip">…</span>
        <button id="btn-settings" class="icon-btn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="btn-signin" class="btn-signin" hidden>Sign in</button>
        <span id="avatar" class="avatar" hidden>AP</span>
      </div>
    </header>

    <!-- Tab bar (main view only) -->
    <nav id="tabbar" class="tabbar" hidden>
      <button class="tab" data-tab="autofill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Autofill
      </button>
      <button class="tab" data-tab="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </button>
      <button class="tab" data-tab="experience">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Experience
      </button>
      <button class="tab" data-tab="education">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1.5 2.5 3 6 3s6-1.5 6-3v-5"/></svg>
        Education
      </button>
      <button class="tab" data-tab="skills">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 9 22 9 17 14 19 21 12 17 5 21 7 14 2 9 9 9 12 2"/></svg>
        Skills
      </button>
      <button class="tab" data-tab="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </nav>

    <!-- Main view: tabbed content -->
    <main id="view-main" hidden>
      <!-- Autofill tab -->
      <section id="tab-autofill" class="tabpanel">
        <div id="site-line" class="site-line"></div>
        <div id="banner" class="banner" hidden></div>
        <div class="scan-card">
          <div class="scan-card-head">
            <span class="scan-status"><span class="live-dot"></span><span id="counts-headline">Scanning…</span></span>
            <span id="counts" class="counts"></span>
          </div>
          <section id="fields" class="fields"></section>
        </div>
        <div class="actions">
          <button id="btn-scan" class="btn secondary">Rescan</button>
          <button id="btn-fill" class="btn primary" disabled>Autofill</button>
        </div>
      </section>

      <!-- Profile tab -->
      <section id="tab-profile" class="tabpanel" hidden>
        <div id="profile-head" class="profile-head"></div>
        <div id="profile-info" class="info-list"></div>
      </section>

      <!-- Experience tab -->
      <section id="tab-experience" class="tabpanel" hidden>
        <div id="experience-list" class="timeline"></div>
      </section>

      <!-- Education tab -->
      <section id="tab-education" class="tabpanel" hidden>
        <div id="education-list" class="timeline"></div>
      </section>

      <!-- Skills tab -->
      <section id="tab-skills" class="tabpanel" hidden>
        <div id="skills-list" class="tags"></div>
      </section>

      <!-- Settings tab -->
      <section id="tab-settings" class="tabpanel" hidden>
        <div class="card">
          <label class="form-label" for="set-api-url">API base URL</label>
          <input id="set-api-url" type="url" placeholder="https://www.tailrd.ca" />
          <label class="form-label" for="set-dash-url">Dashboard URL</label>
          <input id="set-dash-url" type="url" placeholder="https://www.tailrd.ca" />
        </div>
        <div class="card toggles">
          <label class="toggle-row">
            <span class="toggle-text">
              <span class="toggle-title">Use sample data</span>
              <span class="toggle-desc">Autofill from a demo profile — no backend needed.</span>
            </span>
            <input id="set-mock" type="checkbox" class="switch" />
          </label>
          <label class="toggle-row">
            <span class="toggle-text">
              <span class="toggle-title">Fill EEO / demographic fields</span>
              <span class="toggle-desc">Detected by default, but only filled when this is on and your profile has the answers.</span>
            </span>
            <input id="set-eeo" type="checkbox" class="switch" />
          </label>
        </div>
        <div id="settings-error" class="error" hidden></div>
        <div class="actions">
          <button id="btn-settings-save" class="btn primary full">Save settings</button>
        </div>
        <button id="btn-logout" class="btn link full" hidden>Sign out</button>
      </section>
    </main>

    <!-- Login view -->
    <main id="view-login" hidden>
      <div class="card login-card">
        <h2>Connect your account</h2>
        <p class="muted">Sign in with your ApplyPilot account to autofill with your real profile.</p>
        <form id="login-form">
          <label class="form-label" for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="username" required />
          <label class="form-label" for="login-password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" required />
          <div id="login-error" class="error" hidden></div>
          <button type="submit" id="btn-login" class="btn primary full">Sign in</button>
        </form>
        <div class="login-divider"><span>or</span></div>
        <button id="btn-google-login" class="btn google-btn full">
          <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>
        <button id="btn-use-mock" class="btn link full">Continue with sample data instead</button>
      </div>
    </main>

    <footer class="footer">
      <span id="footer-version" class="footer-version">v0.2.0</span>
      <span id="footer-status" class="footer-status"><span class="live-dot"></span>Ready to fill</span>
      <button id="btn-dashboard" class="btn link">Open dashboard ↗</button>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
