<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ApplyPilot Autofill</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <img src="../assets/icon-32.png" alt="" width="22" height="22" />
        <span>ApplyPilot</span>
      </div>
      <div class="header-right">
        <span id="status-chip" class="chip">…</span>
        <button id="btn-settings" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
      </div>
    </header>

    <!-- Main view: scan results + autofill -->
    <main id="view-main" hidden>
      <section id="profile-card" class="card"></section>
      <div id="site-line" class="site-line"></div>

      <div class="actions">
        <button id="btn-scan" class="btn secondary">Scan page</button>
        <button id="btn-fill" class="btn primary" disabled>Autofill</button>
      </div>

      <div id="banner" class="banner" hidden></div>
      <div id="counts" class="counts"></div>
      <section id="fields" class="fields"></section>
    </main>

    <!-- Login view -->
    <main id="view-login" hidden>
      <div class="card login-card">
        <h2>Connect your account</h2>
        <p class="muted">Sign in with your ApplyPilot account to autofill with your real profile.</p>
        <form id="login-form">
          <label class="form-label" for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="username" required />
          <label class="form-label" for="login-password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" required />
          <div id="login-error" class="error" hidden></div>
          <button type="submit" id="btn-login" class="btn primary full">Sign in</button>
        </form>
        <button id="btn-use-mock" class="btn link full">Continue with sample data instead</button>
      </div>
    </main>

    <!-- Settings view -->
    <main id="view-settings" hidden>
      <div class="card">
        <h2>Settings</h2>
        <label class="form-label" for="set-api-url">API base URL</label>
        <input id="set-api-url" type="url" placeholder="https://your-app.vercel.app" />
        <label class="form-label" for="set-dash-url">Dashboard URL</label>
        <input id="set-dash-url" type="url" placeholder="https://your-app.vercel.app" />

        <label class="check-row">
          <input id="set-mock" type="checkbox" />
          <span>Use sample data (no backend needed)</span>
        </label>
        <label class="check-row">
          <input id="set-eeo" type="checkbox" />
          <span>Allow filling EEO / demographic fields</span>
        </label>
        <p class="muted small">
          EEO fields are always detected but left untouched unless you enable this
          <em>and</em> your profile contains those answers.
        </p>

        <div id="settings-error" class="error" hidden></div>
        <div class="actions">
          <button id="btn-settings-back" class="btn secondary">Back</button>
          <button id="btn-settings-save" class="btn primary">Save</button>
        </div>
        <button id="btn-logout" class="btn link full" hidden>Sign out</button>
      </div>
    </main>

    <footer class="footer">
      <button id="btn-dashboard" class="btn link">Open dashboard ↗</button>
      <span class="safety-note">Fills only — never submits for you</span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
